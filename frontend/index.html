<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Modal for API Key -->
    <div id="api-modal" class="modal">
        <div class="modal-content">
            <h2>Bienvenido a DeepSeek Chat</h2>
            <p>Por favor ingresa tu API Key de DeepSeek para comenzar.</p>
            <input type="password" id="api-key-input" placeholder="sk-..." />
            <button id="save-key-btn">Ingresar</button>
            <p id="modal-error" class="error-text hidden">La API key es requerida</p>
        </div>
    </div>

    <!-- Main Chat Interface -->
    <div id="chat-container" class="hidden">
        <header class="chat-header">
            <h1>DeepSeek IA</h1>
            <button id="logout-btn" title="Cambiar API Key">🔒 Cerrar Sesión</button>
        </header>

        <div class="chat-messages" id="chat-messages">
            <!-- Messages will be injected here -->
            <div class="message bot">
                <div class="message-content">
                    ¡Hola! Soy un asistente conectado a DeepSeek. ¿En qué puedo ayudarte hoy?
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="Escribe tu mensaje aquí..." autocomplete="off"/>
            <button id="send-btn">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z" fill="currentColor"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
